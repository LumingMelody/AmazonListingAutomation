    - data:
        code: "import json\nfrom datetime import datetime, timedelta\n\n\ndef is_leap_year(year):\n\
          \    # Check if a year is a leap year\n    return (year % 4 == 0 and year\
          \ % 100 != 0) or (year % 400 == 0)\n\n\ndef get_adjusted_date():\n    today\
          \ = datetime.now()\n    # Calculate the year and month manually to account\
          \ for month overflow\n    month = today.month + 4\n    year = today.year\n\
          \    if month > 12:\n        month -= 12\n        year += 1\n    # Handle\
          \ days if the future month has fewer days\n    try:\n        future_date\
          \ = datetime(year, month, today.day)\n    except ValueError:\n        #\
          \ Adjust for months with fewer days (e.g., February)\n        if month ==\
          \ 2:\n            # Set to last day of February for the calculated year\n\
          \            # Check for leap year for February\n            if is_leap_year(year):\n\
          \                future_date = datetime(year, month, 29)\n            else:\n\
          \                future_date = datetime(year, month, 28)\n        else:\n\
          \            # Set to last day of the month\n            future_date = datetime(year,\
          \ month + 1, 1) - timedelta(days=1)\n    # Check if the date falls on a\
          \ weekend\n    if future_date.weekday() == 5:  # Saturday\n        future_date\
          \ += timedelta(days=2)\n    elif future_date.weekday() == 6:  # Sunday\n\
          \        future_date += timedelta(days=1)\n    # 返回格式化的日期字符串\n    return\
          \ future_date.strftime(\"%Y/%-m/%-d\")\n\n\ndef main(sku_count: int) ->\
          \ dict:\n    result = [[\"\"], [\"Launch Date\"], [\"product_site_launch_date\"\
          ]]\n    show_date = get_adjusted_date()\n    for _ in range(sku_count+1):\n\
          \        result.append([show_date])\n    # print(result)\n    return {\n\
          \        \"result\": json.dumps(result)\n    }"
