          \  if res.status_code == 200:\n        jd_sku_info = res.json()\n    return\
          \ jd_sku_info\n\n\ndef main(sku, site,standard_price) -> dict:\n    sku_list\
          \ = [line.strip() for line in sku.strip().split('\\n')]\n    single_sku\
          \ = sku_list[0][:7]\n    res = requests.get(f\"http://192.168.0.242:5010/api/get_sku_info?sku={single_sku}\"\
          , timeout=60)\n    if res.status_code == 200:\n        sku_info = res.json()\n\
          \    else:\n        raise Exception(\"请求LisaERP出错\")\n    weight_dict =\
          \ sku_info[\"weights\"]\n    price_dict = sku_info[\"prices\"]\n    site_dict\
          \ = {\"Ever-Pretty US\": \"us\", \"Ever-Pretty UK\": \"uk\", \"Ever-Pretty\
          \ FR\": \"eur\"}\n    country = site_dict[site]\n    price = price_dict[country]\n\
          \    Weight_list = []\n    for sk in sku_list:\n        weight = weight_dict.get(sk,\
          \ 0)\n        Weight_list.append(weight)\n    Price_list = []\n    for _\
          \ in sku_list:\n        Price_list.append(price)\n    show_price_error =\
          \ 0\n    show_price_msg = \"\"\n    # if price == 0:\n    #     show_price_error\
          \ = 1\n    #     show_price_msg = f\"未获取到价格，初步判断是老款，请使用新款\\n如果确认该产品{single_sku}是新款，请联系商品中心维护价格\"\
          \n    if not standard_price:\n        show_price_error = 1\n        show_price_msg\
          \ = f\"未获取到价格\"\n    jd_sku_info = get_jd_sku_info(single_sku)\n    if not\
          \ jd_sku_info:\n        raise Exception(\"请求金蝶出错\")\n    show_error = 0\n\
          \    msg = []\n    # 胸垫\n    BraPad = jd_sku_info[\"brapad\"].strip()\n\
          \    if not BraPad:\n        show_error = 1\n        msg.append(\"该产品的【胸垫】字段在金蝶系统中没有维护\"\
          )\n    # 领型\n    CollarType = jd_sku_info[\"collar_type\"].strip()\n   \
